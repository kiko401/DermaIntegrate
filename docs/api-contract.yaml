openapi: 3.0.3
info:
  title: DermaIntegrate - AI Inference Domain API Contract (v3.1)
  description: |
    智能推理域多模态数据契约 v3.1。
    核心升级：专科化重构、全中文防线、动态缺失兼容、报告降级标识。
    应用平台域务必按照新契约适配，旧版代码将无法解析！
  version: 3.1.0
  contact:
    name: AI Inference Team

servers:
  - url: http://124.222.0.186/ai
    description: 智能推理域测试环境

tags:
  - name: System
    description: 系统级接口
  - name: Task
    description: 多模态数据上传与任务管理
  - name: Diagnosis
    description: AI 辅助诊断流式推理与历史特征查询

security:
  - BearerAuth: []

x-static-file-serving:
  description: |
    推理域挂载静态资源服务：
    - /ai-static/images/   → 转码后的 PNG 影像
    - /ai-static/heatmaps/ → 病灶显著性热力图
    前端渲染时需拼接基础域名：http://124.222.0.186 + 相对路径

paths:
  # ==========================================
  # 1. 系统健康检查
  # ==========================================
  /health:
    get:
      tags: [System]
      summary: 推理域健康检查
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: 服务正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                    example: "backend-ai"
                  status:
                    type: string
                    example: "UP"

  # ==========================================
  # 2. 多模态数据上传 (v3.1 重构)
  # ==========================================
  /upload:
    post:
      tags: [Task]
      summary: 上传多模态诊断数据
      description: | 
        接收多模态数据（影像、病历、病理），全可选但至少需提供一项。
        clinical_json 需对齐 PAD-UFES-20 标准；lab_json 语义已变更为病理分期与分子靶向数据(对齐 TCGA-SKCM/AJCC 8th)。
      operationId: uploadData
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: 皮肤镜影像，支持 PNG/JPG/DICOM
                clinical_text:
                  type: string
                  description: 病历自由文本
                clinical_json:
                  type: string
                  description: 结构化病历 JSON 字符串 (对齐 PAD-UFES-20)
                lab_json:
                  type: string
                  description: 病理与分子数据 JSON 字符串 (字段名仍叫 lab_json 以兼容数据库，内部语义为病理)
      responses:
        '202':
          description: 上传成功，推理任务已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadIngestResponse'
        '400':
          description: 未提供任何模态数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==========================================
  # 3. SSE 流式诊断（v3.1 核心重构）
  # ==========================================
  /stream/{task_id}:
    get:
      tags: [Diagnosis]
      summary: SSE 流式获取 AI 辅助诊断证据链
      description: |
        Server-Sent Events 长连接。采用动态窗口机制，前端必须基于收到的步级事件按需渲染，严禁硬编码期待所有 step 出现。
        【SSE 事件类型与载荷契约】：
        - `event: step`      → data: StepEvent (中间推理流，如 image_done, clinical_done, pathology_done)
        - `event: result`    → data: ResultEvent (成功终结，包含 status: complete/incomplete)
        - `event: error`     → data: ErrorEvent (业务异常或证据链断裂)
        - `event: heartbeat` → data: {} (连接保活，忽略即可)
      operationId: streamDiagnosis
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
          description: /upload 返回的任务 ID
      responses:
        '200':
          description: SSE 流
          content:
            text/event-stream:
              schema:
                type: string
        '404':
          description: task_id 不存在

  # ==========================================
  # 4. 历史诊断特征查询 (v3.1 路由变更)
  # ==========================================
  /features/{task_id}:
    get:
      tags: [Diagnosis]
      summary: 获取任务的历史AI辅助诊断特征
      description: 查阅历史病历时调用。特征绑定到 task_id。严禁对历史病历重复发起 GPU 推理流。
      operationId: getHistoricalFeatures
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
          description: 推理任务唯一标识
      responses:
        '200':
          description: 历史特征数据（结构同 SSE result 事件载荷）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultEvent'
        '404':
          description: 该任务尚无成功的推理结果

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

  schemas:
    # ==========================================
    # 通用响应模型
    # ==========================================
    UploadIngestResponse:
      type: object
      required: [task_id, status]
      properties:
        task_id:
          type: string
          description: 全局唯一推理任务标识 (后续 SSE 连接的唯一凭据)
        status:
          type: string
          enum: [accepted]

    # ==========================================
    # SSE 事件载荷定义 (v3.1 重大重构)
    # ==========================================
    StepEvent:
      type: object
      description: 中间推理步骤事件 (动态触发，非必现)
      required: [step, message, data]
      properties:
        step:
          type: string
          enum: [image_done, clinical_done, pathology_done]
          description: | 
            触发条件：image_done(传了file), clinical_done(传了临床数据), pathology_done(传了lab_json)
        message:
          type: string
          example: "视觉定位与形态学完成"
        data:
          type: object
          description: 根据 step 类型不同，data 结构不同 (详见契约文档)

    ResultEvent:
      type: object
      description: 成功终结事件或历史特征查询响应
      required: [task_id, risk_level, key_concerns, recommendations, differential, disclaimer, status]
      properties:
        task_id:
          type: string
        risk_level:
          type: string
          example: "极高危"
        key_concerns:
          type: array
          description: 核心关注要点 (带强引用来源)
          items:
            type: object
            properties:
              item:
                type: string
                example: "病理分期T4b，提示肿瘤厚度大于4毫米伴溃疡"
              source_id:
                type: string
                example: "[AJCC-05]"
        recommendations:
          type: array
          items:
            type: object
            properties:
              item:
                type: string
                example: "强烈建议行前哨淋巴结活检以明确淋巴结状态"
              source_id:
                type: string
                example: "[NCCN-05]"
        differential:
          type: array
          items:
            type: string
          example: ["肢端型黑色素瘤", "肢端色素痣恶变"]
        disclaimer:
          type: string
          example: "本系统结果仅供临床参考，不具有最终诊断效力，请执业医师结合临床判断"
        status:
          type: string
          enum: [complete, incomplete]
          description: | 
            报告完整性标识。incomplete 表示核心金标准缺失，前端必须进行 UI 降级提示(如置灰或加警告边框)。

    ErrorEvent:
      type: object
      required: [error_code, message]
      properties:
        error_code:
          type: string
          example: "INFERENCE_FAILED"
        message:
          type: string
          example: "具体错误信息"

    ErrorResponse:
      type: object
      required: [error, error_code, message]
      properties:
        error:
          type: string
        error_code:
          type: string
        message:
          type: string