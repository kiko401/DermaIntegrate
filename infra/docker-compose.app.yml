services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: derma_app
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-app.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend-app:
    build:
      context: ../backend-app
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
    ports:
      - "80:80"
    depends_on:
      - backend-app
    restart: unless-stopped

volumes:
  mysql_data:
