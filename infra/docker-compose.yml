version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: derma-mysql
    mem_limit: 512m  # 内存限制
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: derma_ai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../backend-ai/sql/init.sql:/docker-entrypoint-initdb.d/01-init-ai.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: derma-qdrant
    mem_limit: 512m  # 内存限制
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7
    container_name: derma-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  fastapi:
    build:
      context: ../backend-ai  # 指向 Dockerfile 所在的目录
      dockerfile: Dockerfile
    container_name: derma-fastapi
    mem_limit: 2g  # FastAPI + PyTorch 需要较多内存
    ports:
      - "8000:8000"
    environment:
      - DOCKER_ENV=true  # 容器内环境标识，连接 Qdrant 和 MySQL 使用容器名
      - DATABASE_URL=mysql+aiomysql://root:root@mysql:3306/derma_ai  # 注意端口是容器内的3306，host是mysql
    depends_on:
      mysql:
        condition: service_healthy  # 必须等 MySQL 完全启动健康后才启动 FastAPI
      qdrant:
        condition: service_started
    volumes:
      - ../backend-ai/static:/app/static  # 映射静态资源，方便查看生成的图片
      - ../backend-ai/uploads:/app/uploads # 映射上传目录

volumes:
  mysql_data:
  qdrant_data:
  redis_data: