version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: derma-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: derma_ai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # 挂载AI域的 SQL 脚本到初始化目录
      - ../backend-ai/sql/init.sql:/docker-entrypoint-initdb.d/01-init-ai.sql
      # - ../backend-app/sql/init.sql:/docker-entrypoint-initdb.d/02-init-app.sql  # 暂时注释，目前只管AI域
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"] # 修正：检查密码改为 root
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: derma-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7
    container_name: derma-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  qdrant_data:
  redis_data: