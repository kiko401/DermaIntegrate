version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: derma-mysql
    restart: unless-stopped
    mem_limit: 512m  # 内存限制
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: derma_ai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # 挂载初始化 SQL 脚本
      - ../backend-ai/sql/init.sql:/docker-entrypoint-initdb.d/01-init-ai.sql
    # 兼容旧版驱动与字符集设置
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: derma-qdrant
    restart: unless-stopped
    mem_limit: 512m  # 内存限制
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # Redis 服务 (可选，预留用于未来缓存或会话管理)
  redis:
    image: redis:7
    container_name: derma-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  fastapi:
    build:
      context: ../backend-ai
      dockerfile: Dockerfile
    container_name: derma-fastapi
    restart: unless-stopped
    mem_limit: 2g  # FastAPI + PyTorch 需要较多内存
    ports:
      - "8000:8000"
    environment:
      # 标识容器环境，触发 Python 代码使用容器内网络
      - DOCKER_ENV=true
      # 容器内网络连接：使用服务名 'mysql' 作为 host
      - DATABASE_URL=mysql+aiomysql://root:root@mysql:3306/derma_ai
      # HuggingFace 镜像源（解决国内网络问题）
      - HF_ENDPOINT=https://hf-mirror.com
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_started
    # 映射运行时生成的静态资源，便于本地调试查看
    volumes:
      - ../backend-ai/static:/app/static
      - ../backend-ai/uploads:/app/uploads

volumes:
  mysql_data:
  qdrant_data:
  redis_data:
